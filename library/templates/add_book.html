{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-primary text-white">

                    <h2 class="mb-0">
                        📚 Add New Book
                    </h2>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Title
                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                placeholder="Enter book title"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Author
                            </label>

                            <input
                                type="text"
                                name="author"
                                class="form-control"
                                placeholder="Enter author name"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                ISBN
                            </label>

                            <input
                                type="text"
                                name="isbn"
                                class="form-control"
                                placeholder="Enter ISBN"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                name="category"
                                class="form-select"
                            >

                                {% for category in categories %}

                                <option value="{{ category.id }}">
                                    {{ category.name }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input
                                type="number"
                                name="quantity"
                                class="form-control"
                                placeholder="Enter quantity"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success"
                        >
                            Save Book
                        </button>

                        <a
                            href="{% url 'book_list' %}"
                            class="btn btn-secondary"
                        >
                            Back
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
