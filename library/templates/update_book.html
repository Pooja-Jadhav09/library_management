{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-warning">

                    <h2 class="mb-0">
                        ✏️ Update Book
                    </h2>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Title
                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                value="{{ book.title }}"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Author
                            </label>

                            <input
                                type="text"
                                name="author"
                                class="form-control"
                                value="{{ book.author }}"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                ISBN
                            </label>

                            <input
                                type="text"
                                name="isbn"
                                class="form-control"
                                value="{{ book.isbn }}"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input
                                type="number"
                                name="quantity"
                                class="form-control"
                                value="{{ book.quantity }}"
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning"
                        >
                            Update Book
                        </button>

                        <a
                            href="{% url 'book_list' %}"
                            class="btn btn-secondary"
                        >
                            Back
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
