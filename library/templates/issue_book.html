{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-primary text-white">

                <h2>
                    📚 Issue Book
                </h2>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Select Book
                        </label>

                        <select
                            name="book"
                            class="form-select"
                            required
                        >

                            {% for book in books %}

                            <option value="{{ book.id }}">
                                {{ book.title }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Select Member
                        </label>

                        <select
                            name="member"
                            class="form-select"
                            required
                        >

                            {% for member in members %}

                            <option value="{{ member.id }}">
                                {{ member.name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Due Date
                        </label>

                        <input
                            type="date"
                            name="due_date"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Issue Book
                    </button>

                    <a
                        href="{% url 'issued_books' %}"
                        class="btn btn-secondary"
                    >
                        Back
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
